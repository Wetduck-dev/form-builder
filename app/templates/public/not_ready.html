<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>فرم آماده نمایش نیست</title>
    <style>
        body {
            direction: rtl;
            font-family: Vazirmatn, sans-serif;
            background: #f8f9fa;
            text-align: center;
            margin-top: 100px;
        }

        .box {
            background: white;
            border: 1px solid #ddd;
            padding: 25px;
            border-radius: 8px;
            display: inline-block;
        }

        .error {
            color: #dc3545;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="error">⚠ این فرم هنوز نهایی نشده است.</div>
        <p>
            لطفاً بعد از نهایی‌سازی دوباره تلاش کنید.
        </p>
    </div>
</body>
</html>
