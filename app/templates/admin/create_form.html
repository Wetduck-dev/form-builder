{% extends "layouts/base.html" %}

{% block content %}

<div class="page-container">

    <!-- Header -->
    <div class="page-header">
        <div class="header-line"></div>
        <div class="header-text">
            <h1 class="page-title">ساخت فرم جدید</h1>
            <p class="page-subtitle">ایجاد یک فرم جدید برای رأی‌گیری یا نظرسنجی</p>
        </div>
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="msg {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <!-- Glass Card Form -->
    <div class="glass-card">

        <form method="post">
            <label for="title" class="form-label">عنوان فرم</label>
            <div class="input-icon">
                <span class="icon"></span>
                <input type="text" id="title" name="title" value="{{ title or '' }}" required>
            </div>





            <label for="description" class="form-label">توضیحات</label>
            <div class="input-icon">
                <span class="icon"></span>
                <textarea id="description" name="description" rows="4">{{ description or '' }}</textarea>
            </div>



            <div class="form-actions" style="margin-top:20px;">

                <button type="submit" name="action" value="create" class="glass-btn"
                        style="background:rgba(0,255,150,0.25); border:1px solid rgba(0,255,150,0.4);">
                    ایجاد فرم
                </button>

                <button type="submit" name="action" value="create_and_builder" class="glass-btn"
                        style="background:rgba(14,165,233,0.35); border:1px solid rgba(14,165,233,0.45);">
                    ایجاد و ورود به Builder
                </button>

                <button type="submit" name="action" value="cancel" class="glass-btn danger" formnovalidate>
                    انصراف
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
