<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>{{ form.title }} - Results</h2>

        <a href="{{ url_for('admin.export_full_results', form_id=form.id) }}"
           class="btn btn-success">
            ⬇ Download Excel
        </a>
    </div>

    <h5>Total Votes: <strong id="totalVotes">{{ total_votes }}</strong></h5>


    <div class="row mt-4">

        <div class="col-md-6">
            <canvas id="barChart"></canvas>
        </div>

        <div class="col-md-6">
            <canvas id="pieChart"></canvas>
        </div>

    </div>

</div>

<script>

const labels = {{ labels | tojson }};
const votes = {{ votes | tojson }};
const percentages = {{ percentages | tojson }};
const formId = {{ form.id }};

// ---------- BAR CHART ----------
const barChart =new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Votes',
            data: votes,
            backgroundColor: 'rgba(54, 162, 235, 0.6)',
            borderRadius: 8
        }]
    },
    options: {
        responsive: true,
        plugins: {
            tooltip: {
                callbacks: {
                    label: function(context) {
                        return context.raw + " votes (" +
                               percentages[context.dataIndex] + "%)";
                    }
                }
            }
        },
        scales: {
            y: {
                beginAtZero: true,
                ticks: {
                    precision: 0
                }
            }
        }
    }
});

// ---------- PIE CHART ----------
const pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'pie',
    data: {
        labels: labels,
        datasets: [{
            data: votes,
            backgroundColor: [
                '#4CAF50',
                '#2196F3',
                '#FFC107',
                '#E91E63',
                '#9C27B0',
                '#00BCD4'
            ]
        }]
    },
    options: {
        responsive: true,
        plugins: {
            tooltip : {
                callbacks: {
                    label: function(context) {
                        return context.label + ": " +
                               percentages[context.dataIndex] + "%";
                    }
                }
            }
        }
    }
});
async function fetchResults() {

    const res = await fetch(`/admin/results_data/${formId}`);
    const data = await res.json();
    document.getElementById("totalVotes").innerText = data.total_votes;
    
    barChart.data.labels = data.labels;
    barChart.data.datasets[0].data = data.votes;

    pieChart.data.labels = data.labels;
    pieChart.data.datasets[0].data = data.votes;

    percentages.splice(0, percentages.length, ...data.percentages);

    barChart.update();
    pieChart.update();

    document.querySelector("h5 strong").innerText = data.total_votes;
}
async function poll() {
    await fetchResults();
    setTimeout(poll, 3000);
}

poll();



</script>

</body>
</html>
