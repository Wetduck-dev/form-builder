{% extends "layouts/base.html" %}
{% block title %}ورود رأی‌دهنده{% endblock %}

{% block content %}
<div class="glass-card" style="padding:30px; max-width:450px; margin:auto;">

    <h3 style="margin-bottom:20px;">فرم: <strong>{{ form.title }}</strong> </h3>
    <p style="margin-bottom:25px;">لطفاً کد ملی خود را وارد کنید</strong></p>

    <form method="POST">

        <div class="field-group">
            <input type="text" name="national_id" required placeholder=" ">
            <label>کد ملی</label>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;">ارسال کد تأیید</button>

    </form>

</div>
{% endblock %}
