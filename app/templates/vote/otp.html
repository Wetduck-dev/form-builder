{% extends "layouts/base.html" %}
{% block title %}تأیید کد OTP{% endblock %}

{% block content %}
<div class="glass-card" style="padding:30px; max-width:450px; margin:auto; text-align:center;">

    <h3 style="margin-bottom:20px;">تأیید کد OTP</h3>

    <p style="text-align:center;">
        کد ملی: <strong>{{ voter.national_id }}</strong>
    </p>

    <form method="POST">

        <div class="field-group">
            <input type="text" name="code" required placeholder=" ">
            <label>کد تأیید</label>
        </div>

        <button type="submit" class="btn btn-success" style="width:100%;">تأیید</button>

    </form>

</div>
{% endblock %}
